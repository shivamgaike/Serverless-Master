<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWS Employee Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:linear-gradient(135deg,#0f172a,#1e3c72,#2a5298);

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

}

.container-box{

    width:100%;
    max-width:1100px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border-radius:25px;

    padding:40px;

    box-shadow:0 15px 40px rgba(0,0,0,.35);

}

.title{

    text-align:center;

    color:white;

    margin-bottom:35px;

}

.title h1{

    font-weight:700;

    margin-bottom:10px;

}

.title p{

    color:#dbeafe;

}

.form-label{

    color:white;

    font-weight:500;

}

.form-control{

    height:55px;

    border-radius:12px;

    border:none;

    padding-left:15px;

}

.form-control:focus{

    box-shadow:0 0 15px rgba(59,130,246,.4);

}

.btn{

    border-radius:12px;

    padding:12px 30px;

    font-weight:600;

    transition:.3s;

}

.btn:hover{

    transform:translateY(-3px);

}

.action-buttons{

    margin-top:35px;

    text-align:center;

}

#EmployeeSaved{

    margin-top:20px;

    color:#7CFC00;

    font-size:18px;

    font-weight:600;

}

.table-card{

    margin-top:45px;

    background:white;

    border-radius:20px;

    overflow:hidden;

}

.table-header{

    background:#0d6efd;

    color:white;

    padding:18px;

    font-size:22px;

    font-weight:600;

}

table{

    margin-bottom:0!important;

}

thead{

    background:#f1f5f9;

}

th{

    text-align:center;

}

td{

    text-align:center;

    vertical-align:middle;

}

tbody tr:hover{

    background:#f8fbff;

}

.footer{

    margin-top:25px;

    text-align:center;

    color:#dbeafe;

    font-size:14px;

}

@media(max-width:768px){

.container-box{

padding:25px;

}

.action-buttons .btn{

display:block;

width:100%;

margin-bottom:15px;

}

}

</style>

</head>

<body>

<div class="container-box">

<div class="title">

<h1>

<i class="fa-solid fa-users"></i>

Employee Management System

</h1>


</div>

<div class="row g-4">

<div class="col-md-6">

<label class="form-label">

<i class="fa-solid fa-id-card"></i>

Employee ID

</label>

<input
type="text"
id="employeeid"
class="form-control"
placeholder="EMP001">

</div>

<div class="col-md-6">

<label class="form-label">

<i class="fa-solid fa-user"></i>

Employee Name

</label>

<input
type="text"
id="name"
class="form-control"
placeholder="John Doe">

</div>

<div class="col-md-6">

<label class="form-label">

<i class="fa-solid fa-building"></i>

Department

</label>

<input
type="text"
id="department"
class="form-control"
placeholder="Engineering">

</div>

<div class="col-md-6">

<label class="form-label">

<i class="fa-solid fa-indian-rupee-sign"></i>

Salary

</label>

<input
type="number"
id="salary"
class="form-control"
placeholder="50000">

</div>

</div>

<div class="action-buttons">

<button
id="saveemployee"
class="btn btn-success btn-lg">

<i class="fa-solid fa-floppy-disk"></i>

Save Employee

</button>

<button
id="getemployees"
class="btn btn-primary btn-lg ms-3">

<i class="fa-solid fa-table"></i>

View Employees

</button>

<div id="EmployeeSaved"></div>

</div>

<div class="table-card">

<div class="table-header">

<i class="fa-solid fa-address-book"></i>

Employee Records

</div>

<div class="table-responsive">

<table
class="table table-hover"
id="EmployeeTable">

<thead>

<tr>

<th>Employee ID</th>

<th>Name</th>

<th>Department</th>

<th>Salary</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>


</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="scripts.js"></script>

</body>

</html>
